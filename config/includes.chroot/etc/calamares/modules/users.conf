---
# Boykisser Linux — relaxed user/password rules.
# We deliberately drop the strict libpwquality checks so people can pick a
# short password on their own machine without Calamares nagging them.
userGroup:       users
defaultGroups:
    - cdrom
    - floppy
    - sudo
    - audio
    - dip
    - video
    - plugdev
    - netdev
    - lpadmin
    - scanner
    - bluetooth
autologinGroup:  autologin
sudoersGroup:    sudo
setRootPassword: false

passwordRequirements:
    nonempty: true       # only rule: don't allow a completely empty password
    minLength: -1        # no minimum length
    maxLength: -1        # no maximum length
