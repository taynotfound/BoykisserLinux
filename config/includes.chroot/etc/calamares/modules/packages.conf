---
backend: apt

# Never refresh the apt database here; the target may be offline.
update_db: false

operations:
  # try_remove ignores packages that are missing or can't be located, so the
  # live-system cleanup never aborts the installation with a "Package Manager
  # error" (apt-get exit 100) when apt can't resolve a live-* package offline.
  - try_remove:
      - 'live-boot'
      - 'live-boot-doc'
      - 'live-config'
      - 'live-config-doc'
      - 'live-config-systemd'
      - 'live-tools'
      - 'live-task-localisation'
      - 'live-task-recommended'
      - 'calamares-settings-debian'
