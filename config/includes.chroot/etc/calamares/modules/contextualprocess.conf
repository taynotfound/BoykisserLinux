---
# Boykisser Linux — run extra steps based on earlier choices :3
# Reacts to the desktop chosen in the packagechooser step. With packagechooser's
# "legacy" method the selection lands in GlobalStorage under a key named after
# the module instance — here the default instance, so "packagechooser_packagechooser"
# (value "xfce" or "kde"). When KDE was picked we hand the mounted target root
# (@@ROOT@@) to boykisser-install-kde, which downloads and sets up KDE Plasma.
# The "xfce" branch is a no-op (it is already installed in the squashfs).

packagechooser_packagechooser:
    kde:
        - command: "/usr/local/bin/boykisser-install-kde @@ROOT@@"
          timeout: 5400
    xfce:
        - "true"
