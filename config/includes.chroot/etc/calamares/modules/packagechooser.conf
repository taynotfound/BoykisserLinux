---
# Boykisser Linux — desktop environment chooser :3
# Lets the user pick their desktop during install. The selection is written to
# GlobalStorage as "packagechooser_desktop" (xfce | kde) and consumed by the
# contextualprocess module, which installs KDE from the internet when chosen.
#
# method: legacy  -> this module only records the choice; it does not touch
#                    packages itself (Boykisser handles KDE via contextualprocess
#                    so it works the same on the full and netinstall ISOs).

mode: required
method: legacy

labels:
    step: "Desktop"

items:
  - id: xfce
    name: "XFCE  (recommended)"
    description: "The signature pink Boykisser XFCE desktop. Lightweight and
                  installs fully offline."
    screenshot: "/usr/share/boykisser/logo.png"

  - id: kde
    name: "KDE Plasma"
    description: "A modern, feature-rich KDE Plasma desktop with the full pink
                  Boykisser theme. Needs an internet connection during install
                  to download it."
    screenshot: "/usr/share/boykisser/logo-dark.png"

default: xfce
