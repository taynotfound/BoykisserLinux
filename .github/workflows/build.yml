name: Build ISO

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish the build under (e.g. v1.0.0). Blank = nightly-DATE."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: build-iso
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: full
            netinstall: "0"
            iso: boykisser-linux-amd64.iso
            item_suffix: ""
          - variant: netinstall
            netinstall: "1"
            iso: boykisser-linux-netinstall-amd64.iso
            item_suffix: "-netinstall"
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "before:"; df -h /
          sudo rm -rf \
            /opt/hostedtoolcache \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /usr/share/swift \
            /usr/local/.ghcup \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /usr/local/lib/node_modules \
            /opt/ghc "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean || true
          sudo docker image prune -af || true
          sudo docker builder prune -af || true
          echo "after:"; df -h /

      - name: Build the builder image
        run: docker build -t boykisser-builder -f docker/Dockerfile.builder docker/

      - name: Toggle the netinstall variant
        if: matrix.netinstall == '1'
        run: |
          # Mirror build.sh --netinstall: keep the heavy apps out of the squashfs
          # and drop the marker the chroot hooks + first-boot service look for.
          extra=config/package-lists/apps-extra.list.chroot
          [ -f "$extra" ] && mv -f "$extra" "$extra.disabled"
          mkdir -p config/includes.chroot/etc/boykisser
          echo "netinstall" > config/includes.chroot/etc/boykisser/netinstall

      - name: Build the live ISO (${{ matrix.variant }})
        run: |
          docker run --rm --privileged \
            -v "$PWD":/build -w /build \
            boykisser-builder -lc '
              set -e
              lb clean --purge || true
              lb config
              lb build
            '

      - name: Name and checksum the ISO
        id: iso
        run: |
          iso=$(ls -1 *.iso | head -n1)
          mv -f "$iso" "${{ matrix.iso }}"
          sha256sum "${{ matrix.iso }}" | tee "SHA256SUMS-${{ matrix.variant }}"
          echo "size=$(du -h "${{ matrix.iso }}" | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Resolve tag
        id: tag
        run: |
          tag="${{ github.event.inputs.release_tag }}"
          if [ -z "$tag" ]; then
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              tag="${GITHUB_REF_NAME}"
            else
              tag="nightly-$(date +%Y%m%d)"
            fi
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "item=boykisser-linux-$tag${{ matrix.item_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Mirror to the Internet Archive
        id: ia
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
          ITEM: ${{ steps.tag.outputs.item }}
          TAG: ${{ steps.tag.outputs.tag }}
          ISO: ${{ matrix.iso }}
          VARIANT: ${{ matrix.variant }}
        run: |
          if [ -z "$IA_ACCESS_KEY" ] || [ -z "$IA_SECRET_KEY" ]; then
            echo "No Internet Archive keys set — skipping mirror upload."
            echo "uploaded=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          pip install --user internetarchive
          mkdir -p ~/.config/internetarchive
          cat > ~/.config/internetarchive/ia.ini <<EOF
          [s3]
          access = ${IA_ACCESS_KEY}
          secret = ${IA_SECRET_KEY}
          EOF
          ia upload "$ITEM" "$ISO" "SHA256SUMS-${VARIANT}" \
            --metadata="title:Boykisser Linux ${TAG} (${VARIANT})" \
            --metadata="mediatype:software" \
            --metadata="collection:opensource_media" \
            --metadata="subject:linux;debian;boykisser-linux" \
            --metadata="creator:taynotfound" \
            --retries 5
          echo "uploaded=true" >> "$GITHUB_OUTPUT"
          {
            echo "item_url=https://archive.org/details/${ITEM}"
            echo "iso_url=https://archive.org/download/${ITEM}/${ISO}"
            echo "torrent_url=https://archive.org/download/${ITEM}/${ITEM}_archive.torrent"
          } >> "$GITHUB_OUTPUT"

      - name: Split ISO for the GitHub fallback
        run: |
          split -b 1900M -d "${{ matrix.iso }}" "${{ matrix.iso }}.part"
          rm -f "${{ matrix.iso }}"
          ls -lh "${{ matrix.iso }}".part* "SHA256SUMS-${{ matrix.variant }}"

      - name: Write release-notes fragment
        env:
          VARIANT: ${{ matrix.variant }}
          ISO: ${{ matrix.iso }}
          UPLOADED: ${{ steps.ia.outputs.uploaded }}
          ISO_URL: ${{ steps.ia.outputs.iso_url }}
          TORRENT_URL: ${{ steps.ia.outputs.torrent_url }}
          ITEM_URL: ${{ steps.ia.outputs.item_url }}
          SIZE: ${{ steps.iso.outputs.size }}
        run: |
          if [ "$VARIANT" = "netinstall" ]; then
            heading="### Netinstall ISO — slim, needs internet on first boot (~${SIZE})"
            blurb="A much smaller image with just the base desktop, browser and store. The installed system downloads the rest (OBS, VLC, codecs, Steam, VS Code, gaming bits + Flatpaks) on first boot, so it needs an internet connection to finish setup."
          else
            heading="### Full ISO — everything offline (~${SIZE})"
            blurb="The complete daily driver: every app is already in the image, installs and runs fully offline."
          fi
          {
            echo "$heading"
            echo
            echo "$blurb"
            echo
            if [ "$UPLOADED" = "true" ]; then
              echo "- **Direct mirror:** ${ISO_URL}"
              echo "- **Torrent:** ${TORRENT_URL} _(can take a few minutes to appear)_"
              echo "- **Mirror page:** ${ITEM_URL}"
              echo
            fi
            echo "GitHub fallback (split parts — reassemble first):"
            echo
            echo '```sh'
            echo "cat ${ISO}.part* > ${ISO}"
            echo 'sha256sum -c SHA256SUMS'
            echo "# double-check /dev/sdX first — this wipes the target drive"
            echo "sudo dd if=${ISO} of=/dev/sdX bs=4M status=progress oflag=sync"
            echo '```'
            echo
          } > "release-notes-${VARIANT}.md"
          cat "release-notes-${VARIANT}.md"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iso-${{ matrix.variant }}
          retention-days: 1
          if-no-files-found: error
          path: |
            ${{ matrix.iso }}.part*
            SHA256SUMS-${{ matrix.variant }}
            release-notes-${{ matrix.variant }}.md

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve tag
        id: tag
        run: |
          tag="${{ github.event.inputs.release_tag }}"
          if [ -z "$tag" ]; then
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              tag="${GITHUB_REF_NAME}"
            else
              tag="nightly-$(date +%Y%m%d)"
            fi
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Combine checksums and release notes
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          cd dist
          # One SHA256SUMS covering both ISOs.
          cat SHA256SUMS-* > SHA256SUMS
          rm -f SHA256SUMS-*
          # Compose the release notes: shared header + full + netinstall fragments.
          {
            echo "## Boykisser Linux ${TAG} :3"
            echo
            echo "Debian 13 (trixie) · amd64 · UEFI + legacy BIOS."
            echo
            echo "Two flavours below — grab the **full** ISO for an offline daily driver,"
            echo "or the **netinstall** ISO for a tiny download that pulls apps on first boot."
            echo
            [ -f release-notes-full.md ] && cat release-notes-full.md
            [ -f release-notes-netinstall.md ] && cat release-notes-netinstall.md
          } > release-notes.md
          rm -f release-notes-full.md release-notes-netinstall.md
          echo "=== files to publish ==="; ls -lh
          echo "=== notes ==="; cat release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Boykisser Linux ${{ steps.tag.outputs.tag }}
          body_path: dist/release-notes.md
          files: |
            dist/boykisser-linux-amd64.iso.part*
            dist/boykisser-linux-netinstall-amd64.iso.part*
            dist/SHA256SUMS

